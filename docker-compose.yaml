services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL:?set NEXT_PUBLIC_BASE_URL in .env}
        NEXT_PUBLIC_VDITOR_CDN: ${NEXT_PUBLIC_VDITOR_CDN:-https://unpkg.com/vditor/dist}
        NEXT_PUBLIC_ICP: ${NEXT_PUBLIC_ICP:-}
    image: anynote-next-web:prod
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: "3000"
      NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL:?set NEXT_PUBLIC_BASE_URL in .env}
      NEXT_PUBLIC_VDITOR_CDN: ${NEXT_PUBLIC_VDITOR_CDN:-https://unpkg.com/vditor/dist}
      NEXT_PUBLIC_ICP: ${NEXT_PUBLIC_ICP:-}
    ports:
      - "127.0.0.1:3000:3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    init: true
